AWSTemplateFormatVersion: '2010-09-09'
Description: 'Birthday Reminder App CloudFormation Template - Creates Lambda, API Gateway, DynamoDB, and IAM roles'

Parameters:
  EnvironmentName:
    Type: String
    Default: dev
    Description: Environment name (dev, staging, prod)
    AllowedValues:
      - dev
      - staging
      - prod

Resources:
  # DynamoDB Table for storing birthdays
  BirthdaysTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'birthdays-${EnvironmentName}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: personId
          AttributeType: S
      KeySchema:
        - AttributeName: personId
          KeyType: HASH
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Application
          Value: BirthdayReminder

  # IAM Role for Lambda execution
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'birthday-reminder-lambda-role-${EnvironmentName}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'

  # Lambda Function for listing birthdays
  ListBirthdaysFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'birthday-reminder-list-${EnvironmentName}'
      Runtime: python3.11
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          TABLE_NAME: !Ref BirthdaysTable
      Code:
        ZipFile: |
          import json

          def lambda_handler(event, context):
              return {
                  'statusCode': 200,
                  'body': json.dumps({
                      'message': 'List birthdays endpoint - implementation needed'
                  })
              }

  # Lambda Function for creating birthdays
  CreateBirthdayFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'birthday-reminder-create-${EnvironmentName}'
      Runtime: python3.11
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          TABLE_NAME: !Ref BirthdaysTable
      Code:
        ZipFile: |
          import json

          def lambda_handler(event, context):
              return {
                  'statusCode': 200,
                  'body': json.dumps({
                      'message': 'Create birthday endpoint - implementation needed'
                  })
              }

  # API Gateway REST API
  BirthdayReminderAPI:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub 'birthday-reminder-api-${EnvironmentName}'
      Description: Birthday Reminder API with list and create endpoints
      EndpointConfiguration:
        Types:
          - REGIONAL

  # API Gateway Resource for /birthdays
  BirthdaysResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref BirthdayReminderAPI
      ParentId: !GetAtt BirthdayReminderAPI.RootResourceId
      PathPart: birthdays

  # GET /birthdays endpoint
  GetBirthdaysMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref BirthdayReminderAPI
      ResourceId: !Ref BirthdaysResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY